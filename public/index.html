<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bos Proxy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
height:100vh;
background:radial-gradient(circle at bottom,#001c22,#00090c);
overflow:hidden;
color:white;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

/* particles */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* title */

.title{
font-size:42px;
font-weight:600;
margin-bottom:25px;
}

/* search */

.search-container{
display:flex;
gap:10px;
background:rgba(0,255,255,.05);
border:1px solid rgba(0,255,255,.2);
padding:12px;
border-radius:14px;
backdrop-filter:blur(6px);
}

input{
width:420px;
padding:12px;
border:none;
outline:none;
border-radius:8px;
background:#06262b;
color:white;
font-size:15px;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#00eaff;
color:black;
font-weight:600;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#00c6d9;
box-shadow:0 0 10px rgba(0,255,255,.6);
}

/* credits */

.credits{
position:fixed;
bottom:15px;
right:20px;
font-size:14px;
opacity:.7;
}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<div class="title">Bos Proxy</div>

<div class="search-container">

<form id="proxyForm">
<input id="urlInput" placeholder="Search the web or enter URL">
<button>Go</button>
</form>

</div>

<div class="credits">Site made by bo</div>

<script>

/* SEARCH */

document.getElementById("proxyForm").addEventListener("submit",function(e){

e.preventDefault()

let input=document.getElementById("urlInput").value.trim()

if(!input)return

let url

if(input.startsWith("http://")||input.startsWith("https://")){
url=input
}else if(input.includes(".")){
url="https://"+input
}else{
url="https://www.google.com/search?q="+encodeURIComponent(input)
}

/* ultraviolet encoded route */

window.location.href="/service/"+encodeURIComponent(url)

})

/* PARTICLES */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth
canvas.height=window.innerHeight
})

class Particle{

constructor(){
this.x=Math.random()*canvas.width
this.y=Math.random()*canvas.height
this.size=Math.random()*2+1
this.speed=Math.random()*1+.2
}

update(){
this.y-=this.speed
if(this.y<0){
this.y=canvas.height
this.x=Math.random()*canvas.width
}
}

draw(){
ctx.fillStyle="rgba(0,255,255,.8)"
ctx.beginPath()
ctx.arc(this.x,this.y,this.size,0,Math.PI*2)
ctx.fill()
}

}

let particles=[]

for(let i=0;i<140;i++){
particles.push(new Particle())
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{
p.update()
p.draw()
})

requestAnimationFrame(animate)
}

animate()

</script>

</body>
</html>
