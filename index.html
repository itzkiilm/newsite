<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bos Proxy</title>

<!-- Ultraviolet client -->
<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#031a1f;
font-family:Arial;
color:white;
overflow:hidden;
}

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.container{
text-align:center;
}

h1{
font-size:48px;
margin-bottom:25px;
}

.search{
display:flex;
justify-content:center;
}

input{
width:400px;
padding:12px;
border-radius:10px;
border:none;
outline:none;
background:#062c33;
color:white;
font-size:16px;
}

button{
margin-left:10px;
padding:12px 18px;
border:none;
border-radius:10px;
background:#00e5ff;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00c7dd;
}

.credit{
position:fixed;
bottom:10px;
right:15px;
font-size:14px;
opacity:0.7;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

<h1>Bos Proxy</h1>

<form id="proxyForm" class="search">
<input id="urlInput" placeholder="Search the web or enter URL">
<button type="submit">Go</button>
</form>

</div>

<div class="credit">Site made by bo</div>

<script>

document.getElementById("proxyForm").addEventListener("submit", function(e){

e.preventDefault();

let input = document.getElementById("urlInput").value.trim();
let url;

if(input.startsWith("http://") || input.startsWith("https://")){
url = input;
}
else if(input.includes(".")){
url = "https://" + input;
}
else{
url = "https://www.google.com/search?q=" + encodeURIComponent(input);
}

window.location.href = "/service/" + encodeURIComponent(url);

});

/* particle background */

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2+1,
speed:Math.random()*0.7+0.2
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.y -= p.speed;
if(p.y<0){
p.y = canvas.height;
p.x = Math.random()*canvas.width;
}

ctx.fillStyle="#00e5ff";
ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
