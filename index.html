<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bos Proxy</title>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#02161a;
font-family:Arial;
color:white;
overflow:hidden;
}

.container{
text-align:center;
}

h1{
font-size:48px;
margin-bottom:20px;
}

.searchbox{
display:flex;
justify-content:center;
}

input{
width:420px;
padding:12px;
border-radius:10px;
border:none;
background:#053038;
color:white;
font-size:16px;
outline:none;
}

button{
margin-left:10px;
padding:12px 18px;
border:none;
border-radius:10px;
background:#00e5ff;
font-weight:bold;
cursor:pointer;
}

.credit{
position:fixed;
bottom:10px;
right:15px;
font-size:14px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

<h1>Bos Proxy</h1>

<div class="searchbox">
<input id="urlInput" placeholder="Search the web or enter URL">
<button onclick="go()">Go</button>
</div>

</div>

<div class="credit">Site made by bo</div>

<script>

function go(){

let input = document.getElementById("urlInput").value.trim()

if(!input) return

let url

if(input.startsWith("http://") || input.startsWith("https://")){
url = input
}
else if(input.includes(".")){
url = "https://" + input
}
else{
url = "https://www.google.com/search?q=" + encodeURIComponent(input)
}

const encoded = __uv$config.encodeUrl(url)

location.href = __uv$config.prefix + encoded

}

document.getElementById("urlInput").addEventListener("keydown", function(e){

if(e.key === "Enter"){
go()
}

})

</script>

</body>
</html>
