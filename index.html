<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BosProxy</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root { --teal:#00f5ff; --teal2:#00b4d8; --bg:#020e10; }
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:#fff;font-family:'Space Mono',monospace;overflow:hidden;}

canvas{position:fixed;inset:0;z-index:0;}
.gbg{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 50% 110%,rgba(0,180,216,.18) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 50% -10%,rgba(0,245,255,.07) 0%,transparent 70%);}
.grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(0,245,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.025) 1px,transparent 1px);background-size:60px 60px;}
.vig{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse at center,transparent 35%,#020e10 100%);}

.c{position:fixed;z-index:5;width:60px;height:60px;pointer-events:none;opacity:.25;}
.c.tl{top:18px;left:18px;border-top:1px solid var(--teal);border-left:1px solid var(--teal);}
.c.tr{top:18px;right:18px;border-top:1px solid var(--teal);border-right:1px solid var(--teal);}
.c.bl{bottom:18px;left:18px;border-bottom:1px solid var(--teal);border-left:1px solid var(--teal);}
.c.br{bottom:18px;right:18px;border-bottom:1px solid var(--teal);border-right:1px solid var(--teal);}

.stage{position:relative;z-index:10;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* LOGO */
.logo{display:flex;flex-direction:column;align-items:center;margin-bottom:48px;animation:up .9s cubic-bezier(.16,1,.3,1) both;}
.logo svg{width:54px;height:54px;margin-bottom:18px;filter:drop-shadow(0 0 20px rgba(0,245,255,.85));}
.logo h1{font-family:'Syne',sans-serif;font-size:clamp(38px,6vw,66px);font-weight:800;letter-spacing:-1px;line-height:1;background:linear-gradient(135deg,#fff 0%,#00f5ff 55%,#00b4d8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 24px rgba(0,245,255,.35));}
.logo p{margin-top:11px;font-size:10px;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(90deg,#00b4d8,#00f5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* SEARCH BOX */
.search{width:min(500px,88vw);animation:up .9s .12s cubic-bezier(.16,1,.3,1) both;}
.sbox{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(0,245,255,.07),rgba(0,180,216,.12));border:1px solid rgba(0,245,255,.3);border-radius:13px;padding:6px;backdrop-filter:blur(16px);transition:border-color .2s,box-shadow .2s;}
.sbox:focus-within{border-color:rgba(0,245,255,.8);box-shadow:0 0 0 3px rgba(0,245,255,.08),0 0 46px rgba(0,245,255,.18);}
.sbox input{flex:1;min-width:0;background:none;border:none;outline:none;color:#fff;font-family:'Space Mono',monospace;font-size:13px;padding:10px 12px;caret-color:var(--teal);}
.sbox input::placeholder{color:rgba(255,255,255,.35);}
.btn{flex-shrink:0;background:linear-gradient(135deg,#00f5ff,#00b4d8);color:#020e10;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;letter-spacing:2px;padding:11px 20px;cursor:pointer;white-space:nowrap;transition:opacity .15s,box-shadow .15s,transform .1s;}
.btn:hover{opacity:.85;box-shadow:0 0 26px rgba(0,245,255,.5);}
.btn:active{transform:scale(.96);}
.hint{margin-top:12px;text-align:center;font-size:10px;letter-spacing:1px;background:linear-gradient(90deg,rgba(255,255,255,.5),rgba(0,245,255,.8));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* STATUS */
.status{margin-top:30px;display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:3px;background:linear-gradient(90deg,rgba(255,255,255,.6),rgba(0,245,255,.9));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:up .9s .25s cubic-bezier(.16,1,.3,1) both;}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#00f5ff,#00b4d8);box-shadow:0 0 8px var(--teal);animation:pulse 2.2s ease-in-out infinite;}

/* CREDITS */
.credits{position:fixed;bottom:14px;right:18px;z-index:20;font-size:10px;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(90deg,rgba(255,255,255,.45),rgba(0,245,255,.75));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:default;}

@keyframes up{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.72)}}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="gbg"></div>
<div class="grid"></div>
<div class="vig"></div>
<div class="c tl"></div><div class="c tr"></div><div class="c bl"></div><div class="c br"></div>

<div class="stage">
  <div class="logo">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="28" stroke="#00f5ff" stroke-width="1.5" stroke-dasharray="4 3" opacity=".5"/>
      <circle cx="32" cy="32" r="18" stroke="#00f5ff" stroke-width="1" opacity=".7"/>
      <circle cx="32" cy="32" r="5" fill="#00f5ff"/>
      <line x1="32" y1="4"  x2="32" y2="14" stroke="#00f5ff" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="32" y1="50" x2="32" y2="60" stroke="#00f5ff" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="4"  y1="32" x2="14" y2="32" stroke="#00f5ff" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="50" y1="32" x2="60" y2="32" stroke="#00f5ff" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <h1>BosProxy</h1>
    <p>Browse freely &mdash; stay hidden</p>
  </div>

  <div class="search">
    <div class="sbox">
      <input id="mainInput" type="text" placeholder="Search or enter a URL..." autocomplete="off" spellcheck="false">
      <button class="btn" onclick="go()">GO</button>
    </div>
    <div class="hint">Press Enter or click GO &mdash; opens in your proxy</div>
  </div>

  <div class="status">
    <div class="dot"></div>
    <span>PROXY ONLINE</span>
  </div>
</div>

<div class="credits">Site made by bo</div>

<script>
const BACKEND = "https://riders-isaac-shipped-july.trycloudflare.com";

function go() {
  const raw = document.getElementById("mainInput").value.trim();
  if (!raw) return;

  let url;
  if (raw.startsWith("http://") || raw.startsWith("https://")) {
    url = raw;
  } else if (raw.includes(".") && !raw.includes(" ")) {
    url = "https://" + raw;
  } else {
    url = "https://www.google.com/search?q=" + encodeURIComponent(raw);
  }

  // Open directly on the backend so service worker works correctly
  window.location.href = BACKEND + "/?url=" + encodeURIComponent(url);
}

document.getElementById("mainInput").addEventListener("keydown", e => {
  if (e.key === "Enter") go();
});

// PARTICLES
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener("resize", resize);

const particles = [];
for (let i = 0; i < 150; i++) {
  particles.push({ x:Math.random()*canvas.width, y:Math.random()*canvas.height, size:Math.random()*1.6+.3, speed:Math.random()*.45+.12, opacity:Math.random()*.55+.15 });
}

let mx = -999, my = -999;
window.addEventListener("mousemove", e => { mx = e.clientX; my = e.clientY; });

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const p of particles) {
    const dx = p.x-mx, dy = p.y-my, dist = Math.sqrt(dx*dx+dy*dy);
    if (dist < 90) { p.x += (dx/dist)*.4; p.y += (dy/dist)*.4; }
    p.y -= p.speed;
    if (p.y < -4) { p.y = canvas.height+4; p.x = Math.random()*canvas.width; }
    ctx.globalAlpha = p.opacity;
    ctx.fillStyle = "#00f5ff";
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
